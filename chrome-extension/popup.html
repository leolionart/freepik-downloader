<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freepik Downloader</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <p class="eyebrow">Chrome extension</p>
        <h1>Freepik Downloader</h1>
      </header>

      <section class="panel">
        <label class="label" for="apiKeyInput">Freepik API Key</label>
        <div class="input-wrapper">
          <input id="apiKeyInput" type="password" placeholder="Enter API Key from Freepik..." />
          <button id="togglePassword" class="btn-icon" type="button" title="Toggle visibility">
            <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <p class="hint">Get your key at <a href="https://developer.freepik.com" target="_blank">developer.freepik.com</a>. This key is stored securely in your browser.</p>
      </section>

      <section class="panel">
        <p class="label">Current Tab</p>
        <div id="tabState" class="tab-state">Reading tab...</div>
      </section>

      <footer class="actions">
        <button id="saveButton" class="btn btn-secondary" type="button">Save Settings</button>
        <button id="confirmButton" class="btn btn-primary" type="button" disabled>
          Direct Download
        </button>
      </footer>

      <p id="messageBar" class="message"></p>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
  </html>
